name: Deploy MediSync Frontend to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev-front-end   # ✅ uses your environment secrets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          set -x
          npm install

      - name: Build project
        run: |
          set -x
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 🔎 Debugging steps
      - name: Echo environment values
        run: |
          set -x
          echo "AWS Region: ${{ secrets.AWS_REGION }}"
          echo "S3 Bucket: ${{ secrets.S3_BUCKET }}"

      - name: Debug AWS identity
        run: |
          set -x
          aws sts get-caller-identity

      - name: Debug list bucket
        run: |
          set -x
          aws s3 ls s3://${{ secrets.S3_BUCKET }} --region ${{ secrets.AWS_REGION }}

      # ✅ Deploy step
      - name: Deploy to S3
        run: |
          set -x
          aws s3 sync build/ s3://${{ secrets.S3_BUCKET }} --delete --region ${{ secrets.AWS_REGION }}
